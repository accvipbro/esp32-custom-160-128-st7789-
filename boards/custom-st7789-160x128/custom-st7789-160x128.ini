[env:custom-st7789-160x128]
board = esp32dev
board_build.partitions = custom_8Mb.csv
board_build.psram = enabled
build_src_filter = ${env.build_src_filter} +<../boards/custom-st7789-160x128> -<../src/modules/nrf24/> -<../src/modules/ir/> -<../src/modules/gps/> -<../src/modules/qr/> -<../src/modules/wifi/> -<../src/modules/ble/> -<../src/modules/nfc/>
build_flags =
	${env.build_flags}
	-Iboards/custom-st7789-160x128
	-Os
	-DCODEC_DEBUG_LEVEL=0
	-DDEVICE_NAME='"Custom ST7789 160x128"'
	-DTOUCH_XPT2046_SPI
	-DXPT2046_TOUCH_CONFIG_INT_GPIO_NUM=21
	-DXPT2046_SPI_BUS_MISO_IO_NUM=19
	-DXPT2046_SPI_BUS_MOSI_IO_NUM=23
	-DXPT2046_SPI_BUS_SCLK_IO_NUM=18
	-DXPT2046_SPI_CONFIG_CS_GPIO_NUM=22
	-DBAD_RX=3
	-DBAD_TX=1
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-Wl,--strip-all
